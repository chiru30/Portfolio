<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Chiranthana Rampura</title>
    <meta name="description" content="Portfolio website of Chiranthana Rampura." />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Apply theme early to avoid flash.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          if (saved === "light" || saved === "dark") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <a class="brand-link" href="./">Chiranthana Rampura</a>
        </div>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link is-active" href="./">Home</a>
        </nav>

        <div class="actions">
          <button id="themeToggle" class="button" type="button">
            Toggle theme
          </button>
        </div>
      </div>
    </header>

    <main id="main" class="container">
      <section class="hero">
        <h1>Chiranthana Rampura</h1>
        <p class="lead">
          Research-focused portfolio. Simple, readable, and built to publish work.
        </p>
      </section>

      <section class="card">
        <h2>About</h2>
        <p>
          Add a short academic-style bio here (area, interests, current program,
          advisor/lab if applicable, and what you’re looking for).
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p class="muted">
          © <span id="year"></span> Chiranthana Rampura
        </p>
      </div>
    </footer>

    <script src="./theme.js"></script>
  </body>
</html>
